<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/responsive.css">
    <title>Karakover</title>
</head>
<body>

    <section class="ct_login_bg">
        <div class="ct_login_left">
            <img src="assets/img/logo.png" alt="">
            <h4 class="ct_fs_40 ct_fw_500">Welcome Back!</h4>
        </div>
        <div class="ct_right_login">
            <h4 class="ct_mb_30">Sign In to your account</h4>
            <div class="d-flex align-items-center justify-content-center gap-3 ct_social_login_btns">
                <button class=" ct_btn_outline ct_me_20"><img src="assets/img/google.svg" alt="Google">Google</button>
                <button class=" ct_btn_outline"><img src="assets/img/apple.svg" alt="Apple">Apple</button>
                <button class=" ct_btn_outline"><img src="assets/img/facebook.svg" alt="Facebook">Facebook</button>
            </div>

            <div class="d-flex align-items-center justify-content-center mt-4">
                <hr class="ct_hr">
                <span class="ct_mx_10 text-white">or</span>
                <hr class="ct_hr">
            </div>
            <form action="" class="mt-4">
                <div class="row">
                    <div class="col-12">
                       <div class="form-group mb-3">
                         <label for="" class="ct_fs_16 ct_fw_500 mb-2 text-white">Email</label>
                        <input type="email" class="form-control  ct_input" placeholder="Enter your email">
                       </div>
                         
                    </div>
                    <div class="col-12">
                       <div class="form-group mb-3">
                         <label for="" class="ct_fs_16 ct_fw_500 mb-2 text-white">Password</label>
                       <div class="position-relative">
                            <input type="password" class="form-control  ct_input ct_input_pe_40" placeholder="Enter your password">
                            <i class="ct_show_eye fa-regular fa-eye"></i>
                        </div>
                       </div>
                         
                    </div>
                    <a href="forgot-password.html" class="text-white ct_fw_600 ct_fs_14 text-end d-inline-block">Forgot password?</a>

                    <a href="onboarding.html"  class="ct_custom_btn  mt-4">
                        Sign In
                    </a>


                    <p class="mb-0 text-white text-center mt-4">Don’t have an account? <a href="signup.html" class="text-white ct_fw_600">Sign Up</a></p>

                </div>
            </form>

        </div>
    </section>

    
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
