<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/responsive.css">
    <title>Karakover</title>
</head>
<body>

    <section class="ct_login_bg">
        <div class="ct_login_left">
            <img src="assets/img/logo.png" alt="">
            <h4 class="ct_fs_40 ct_fw_500">Welcome Back!</h4>
        </div>
        <div class="ct_right_login">
           <div class="ct_mb_30">
             <h4 class="mb-2">Forgot Your Password?</h4>
            <p class="mb-0 ct_text_clr_A1A1A1 text-center mx-auto" style="max-width: 400px;" >Don’t worry it happens, please enter the email associated  with your account.</p>
           </div>
        
            
            <form action="" class="mt-4">
                <div class="row">
                    <div class="col-12">
                       <div class="form-group mb-3">
                         <label for="" class="ct_fs_16 ct_fw_500 mb-2 text-white">Email</label>
                        <input type="email" class="form-control  ct_input" placeholder="Enter your email">
                       </div>
                         
                    </div>
                  

                    <a href="reset-password.html" class="ct_custom_btn  mt-4">
                       Submit
                    </a>

                    <p class="mb-0 ct_text_clr_A1A1A1 text-center mt-4">A link will be sent to your registered email address to reset your password.</p>


                    <p class="mb-0 text-white text-center mt-4"><span class="opacity-75">Go back to</span>  <a href="login.html" class="text-white ct_fw_600">Sign In</a></p>

                </div>
            </form>

        </div>
    </section>

    
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
